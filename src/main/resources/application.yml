server:
  port: ${SERVER_PORT:9220}
  servlet:
    context-path: /sod-eval

spring:
  application:
    name: sod-evaluation-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_NAME:ecmg6new}?allowPublicKeyRetrieval=true&useSSL=false&allowLoadLocalInfile=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:rootpass}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000

sod:
  evaluation:
    batch-size: ${SOD_BATCH_SIZE:1000}
    max-depth: ${SOD_MAX_DEPTH:14}
    write-batch-size: ${SOD_WRITE_BATCH_SIZE:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
